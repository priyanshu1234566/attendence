<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:#fff;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

input:focus{
    border-color:#2b6cb0;
}

button{
    width:100%;
    padding:10px;
    background:#2b6cb0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2c5282;
}

.toggle{
    margin-top:12px;
    cursor:pointer;
    color:#2b6cb0;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">
    <h2 id="title">Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="handleAuth()">Login</button>

    <div class="toggle" onclick="toggleMode()">Create Account</div>
</div>

<script>

let isLogin = true;

/* 🔄 Toggle Login/Signup */
function toggleMode(){
    isLogin = !isLogin;

    document.getElementById("title").innerText = isLogin ? "Login" : "Signup";
    document.querySelector("button").innerText = isLogin ? "Login" : "Signup";
    document.querySelector(".toggle").innerText = isLogin ? "Create Account" : "Already have account?";
}

/* 🔐 Auth System */
function handleAuth(){

    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(!user || !pass){
        alert("Fill all fields");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(isLogin){

        /* ✅ ADMIN LOGIN */
        if(user === "admin" && pass === "admin123"){
            localStorage.setItem("admin", "true");
            localStorage.removeItem("loggedInUser");
            window.location.href = "admin.html";
            return;
        }

        /* ✅ USER LOGIN */
        if(users[user] && users[user] === pass){
            localStorage.setItem("loggedInUser", user);
            localStorage.removeItem("admin");
            window.location.href = "index.html";
        }else{
            alert("Invalid username or password");
        }

    }else{

        /* ✅ SIGNUP */
        if(users[user]){
            alert("User already exists");
        }else{
            users[user] = pass;
            localStorage.setItem("users", JSON.stringify(users));
            alert("Account created successfully!");
            toggleMode();
        }
    }
}

</script>

</body>
</html>
