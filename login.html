<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:#fff;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

input:focus{
    border-color:#2b6cb0;
}

button{
    width:100%;
    padding:10px;
    background:#2b6cb0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2c5282;
}

.toggle{
    margin-top:12px;
    cursor:pointer;
    color:#2b6cb0;
    font-size:14px;
}

.error{
    color:red;
    font-size:13px;
}
</style>
</head>

<body>

<div class="box">
    <h2 id="title">Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <div class="error" id="errorMsg"></div>

    <button onclick="handleAuth()">Login</button>

    <div class="toggle" onclick="toggleMode()">Create Account</div>
</div>

<script>

let isLogin = true;

/* ✅ Auto Redirect if already logged in */
if(localStorage.getItem("admin")){
    window.location.href = "admin.html";
}
if(localStorage.getItem("loggedInUser")){
    window.location.href = "index.html";
}

/* 🔄 Toggle Login/Signup */
function toggleMode(){
    isLogin = !isLogin;

    document.getElementById("title").innerText = isLogin ? "Login" : "Signup";
    document.querySelector("button").innerText = isLogin ? "Login" : "Signup";
    document.querySelector(".toggle").innerText = isLogin ? "Create Account" : "Already have account?";
    document.getElementById("errorMsg").innerText = "";
}

/* 🔐 Auth System */
function handleAuth(){

    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();
    let error = document.getElementById("errorMsg");

    if(!user || !pass){
        error.innerText = "⚠ Please fill all fields";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(isLogin){

        /* 🔥 ADMIN LOGIN */
        if(user === "admin" && pass === "admin123"){
            localStorage.setItem("admin", "true");
            localStorage.removeItem("loggedInUser");
            window.location.href = "admin.html";
            return;
        }

        /* 👤 USER LOGIN */
        if(users[user] && users[user] === pass){
            localStorage.setItem("loggedInUser", user);
            localStorage.removeItem("admin");
            window.location.href = "index.html";
        }else{
            error.innerText = "❌ Invalid username or password";
        }

    }else{

        /* 🆕 SIGNUP */
        if(users[user]){
            error.innerText = "⚠ User already exists";
        }else{
            users[user] = pass;
            localStorage.setItem("users", JSON.stringify(users));
            alert("✅ Account created successfully!");
            toggleMode();
        }
    }
}

/* ⌨ Enter key support */
document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        handleAuth();
    }
});

</script>

</body>
</html>
