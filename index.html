<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Attendance</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">
</head>

<body>

<div class="container">
    
    <h2>College Attend</h2>

    <!-- Header -->
    <div class="header">
        <div>
            Tpr No: 
            <input type="text" placeholder="Enter Tpr No" id="tpr">
        </div>

        <div>
            Date: 
            <input type="date" id="date">
        </div>
    </div>

    <!-- Inputs -->
    <div class="tabs">
        <input type="text" placeholder="University Name" id="university">
        <input type="text" placeholder="College Name" id="college">
        <input type="text" placeholder="Course Name" id="course">
        <input type="text" placeholder="Search Student..." id="search" onkeyup="searchData()">
    </div>

    <!-- Main Table -->
    <table id="table">
        <thead>
            <tr>
                <th>SR.</th>
                <th>Name</th>
                <th>Class</th>
                <th>Roll</th>
                <th>M</th>
                <th>T</th>
                <th>W</th>
                <th>Th</th>
                <th>F</th>
                <th>Sat</th>
                <th>Total</th>
                <th>%</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <!-- Buttons -->
    <button class="btn add" id="addBtn">+ Add Student</button>
    <button class="btn delete" onclick="deleteRow()">Delete</button>
    <button onclick="calculate(); getHeaderData()">Show Data</button>
    <div class="download" onclick="downloadCSV()">⬇ Download</div>

    <!-- Output Section -->
    <div id="outputBox" style="display:none; margin-top:20px;">

        <h3>Student Data</h3>

        <!-- Filter -->
        <button onclick="toggleFilter()">Filter</button>

        <div id="filterBox" style="display:none; margin:10px 0;">
            <input type="text" placeholder="Filter by Name" id="filterName" onkeyup="applyFilter()">
            <input type="text" placeholder="Filter by Class" id="filterClass" onkeyup="applyFilter()">
            <input type="text" placeholder="Filter by Roll" id="filterRoll" onkeyup="applyFilter()">
        </div>

        <!-- Output Table -->
        <table border="1" width="100%" id="outputTable">
            <thead>
                <tr>
                    <th>University</th>
                    <th>College</th>
                    <th>Course</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Roll</th>
                    <th>Present</th>
                    <th>Absent</th>
                    <th>Action</th> <!-- ✅ Added -->
                </tr>
            </thead>
            <tbody id="outputBody"></tbody>
        </table>

        <!-- Clear All -->
        <button onclick="clearAllData()">Clear All Data</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
