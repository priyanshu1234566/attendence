<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial;
    background:#0f172a;
    color:#fff;
    padding:20px;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

h2{
    font-size:22px;
}

/* BUTTONS */
button{
    padding:8px 12px;
    border:none;
    cursor:pointer;
    border-radius:6px;
    transition:0.2s;
}

.delete{
    background:#ef4444;
    color:white;
}
.delete:hover{ background:#dc2626; }

.logout{
    background:#3b82f6;
    color:white;
}
.logout:hover{ background:#2563eb; }

.clear{
    background:#f59e0b;
    color:white;
    margin-top:10px;
}

.export{
    background:#10b981;
    color:white;
    margin-left:10px;
}

/* TABLE */
.table-box{
    overflow-x:auto;
    margin-top:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th{
    background:#1e293b;
}

th,td{
    border:1px solid #334155;
    padding:10px;
    text-align:center;
}

/* FILTER */
.filter-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

.filter{
    padding:8px;
    border-radius:6px;
    border:none;
}

/* SECTION */
.section{
    margin-top:30px;
    padding:15px;
    background:#1e293b;
    border-radius:10px;
}

/* EMPTY */
.empty{
    text-align:center;
    padding:15px;
    color:#94a3b8;
}

/* STATS */
.stats{
    margin-top:10px;
    color:#38bdf8;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>⚙️ Admin Panel</h2>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- USERS -->
<div class="section">
    <h3>👤 Users</h3>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>
</div>

<!-- ATTENDANCE -->
<div class="section">
    <h3>📊 Attendance Data (All Users)</h3>

    <div class="filter-box">
        <input class="filter" placeholder="Search User" id="fUser" onkeyup="filterData()">
        <input class="filter" placeholder="Search Name" id="fName" onkeyup="filterData()">
        <input class="filter" placeholder="Search College" id="fCollege" onkeyup="filterData()">
    </div>

    <div class="stats" id="stats"></div>

    <div class="table-box">
        <table id="adminTable">
            <thead>
                <tr>
                    <th>User</th>
                    <th>University</th>
                    <th>College</th>
                    <th>Course</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Roll</th>
                    <th>Present</th>
                    <th>Absent</th>
                    <th>%</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="attendanceTable"></tbody>
        </table>
    </div>

    <button class="clear" onclick="clearAllAttendance()">Clear All</button>
    <button class="export" onclick="exportCSV()">Export CSV</button>
</div>

<script>

/* 🔐 Protect */
if(!localStorage.getItem("admin")){
    window.location.href = "login.html";
}

/* 👤 LOAD USERS */
function loadUsers(){
    let users = JSON.parse(localStorage.getItem("users")) || {};
    let output = "";

    let keys = Object.keys(users);

    if(keys.length === 0){
        output = `<tr><td colspan="2" class="empty">No users</td></tr>`;
    }else{
        keys.forEach(user => {
            output += `
            <tr>
                <td>${user}</td>
                <td>
                    <button class="delete" onclick="deleteUser('${user}')">Delete</button>
                </td>
            </tr>
            `;
        });
    }

    userTable.innerHTML = output;
}

/* ❌ DELETE USER */
function deleteUser(user){

    if(!confirm("Delete user + all data?")) return;

    let users = JSON.parse(localStorage.getItem("users")) || {};
    delete users[user];
    localStorage.setItem("users", JSON.stringify(users));

    let all = JSON.parse(localStorage.getItem("allAttendance")) || [];
    all = all.filter(d => d.user !== user);
    localStorage.setItem("allAttendance", JSON.stringify(all));

    loadUsers();
    loadAttendance();
}

/* 📊 LOAD ATTENDANCE */
function loadAttendance(){

    let data = JSON.parse(localStorage.getItem("allAttendance")) || [];
    let output = "";

    if(data.length === 0){
        output = `<tr><td colspan="11" class="empty">No data</td></tr>`;
    }else{
        data.forEach((d,i)=>{
            output += `
            <tr>
                <td>${d.user}</td>
                <td>${d.university}</td>
                <td>${d.college}</td>
                <td>${d.course}</td>
                <td>${d.name}</td>
                <td>${d.className}</td>
                <td>${d.roll}</td>
                <td>${d.present}</td>
                <td>${d.absent}</td>
                <td>${d.percent}</td>
                <td>
                    <button class="delete" onclick="deleteAttendance(${i})">Delete</button>
                </td>
            </tr>
            `;
        });
    }

    attendanceTable.innerHTML = output;
    stats.innerText = "Total Records: " + data.length;
}

/* ❌ DELETE SINGLE */
function deleteAttendance(i){
    let data = JSON.parse(localStorage.getItem("allAttendance")) || [];
    if(!confirm("Delete record?")) return;

    data.splice(i,1);
    localStorage.setItem("allAttendance", JSON.stringify(data));

    loadAttendance();
}

/* ❌ CLEAR ALL */
function clearAllAttendance(){
    if(!confirm("Delete ALL data?")) return;

    localStorage.removeItem("allAttendance");
    loadAttendance();
}

/* 🔍 FILTER */
function filterData(){

    let u = fUser.value.toLowerCase();
    let n = fName.value.toLowerCase();
    let c = fCollege.value.toLowerCase();

    document.querySelectorAll("#attendanceTable tr").forEach(row=>{
        let td = row.cells;

        let match =
            td[0].innerText.toLowerCase().includes(u) &&
            td[4].innerText.toLowerCase().includes(n) &&
            td[2].innerText.toLowerCase().includes(c);

        row.style.display = match ? "" : "none";
    });
}

/* 📁 EXPORT CSV */
function exportCSV(){
    let rows = document.querySelectorAll("#adminTable tr");
    let csv = [];

    rows.forEach(r=>{
        let cols = r.querySelectorAll("td,th");
        let row = [];

        cols.forEach(c=>{
            row.push(c.innerText);
        });

        csv.push(row.join(","));
    });

    let blob = new Blob([csv.join("\n")], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "admin_attendance.csv";
    a.click();
}

/* 🚪 LOGOUT */
function logout(){
    localStorage.removeItem("admin");
    window.location.href = "login.html";
}

/* INIT */
loadUsers();
loadAttendance();

</script>

</body>
</html>
