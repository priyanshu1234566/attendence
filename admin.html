<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:#0f172a;
    color:#e2e8f0;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    background:#020617;
    padding:20px;
    position:fixed;
}

.sidebar h2{
    text-align:center;
    color:#38bdf8;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    cursor:pointer;
}
.sidebar a:hover{
    background:#1e293b;
}

/* MAIN */
.main{
    margin-left:240px;
    width:100%;
    padding:20px;
}

/* TOPBAR */
.topbar{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

/* SECTION */
.section{
    margin-top:20px;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    padding:10px;
    text-align:center;
}
th{
    background:#020617;
    color:#38bdf8;
}
tr:nth-child(even){
    background:#0f172a;
}

/* BUTTON */
button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.delete{ background:#ef4444;color:#fff; }
.approve{ background:#22c55e;color:#fff; }

/* PAGE */
.page{display:none;}
.page.activePage{display:block;}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("admin")){
    window.location.href="login.html";
}
</script>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Admin</h2>

    <a onclick="showSection('dashboard')">Dashboard</a>
    <a onclick="showSection('users')">Users</a>
    <a onclick="showSection('approval')">Approval</a>
    <a onclick="showSection('attendance')">Attendance</a>
    <a onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
    <h2>Admin Dashboard</h2>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page activePage">
    <div class="cards">
        <div class="card">
            <h3>Total Users</h3>
            <p id="totalUsers">0</p>
        </div>
        <div class="card">
            <h3>Pending</h3>
            <p id="pendingUsers">0</p>
        </div>
        <div class="card">
            <h3>Total Records</h3>
            <p id="totalRecords">0</p>
        </div>
    </div>
</div>

<!-- USERS -->
<div id="users" class="page">
    <div class="section">
        <h3>Users</h3>
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>
</div>

<!-- APPROVAL -->
<div id="approval" class="page">
    <div class="section">
        <h3>Pending Approval</h3>
        <div id="approvalList"></div>
    </div>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="page">
    <div id="attendanceTable"></div>
</div>

</div>

<script>

/* NAVIGATION */
function showSection(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
    document.getElementById(id).classList.add("activePage");
}

/* LOAD USERS */
function loadUsers(){
    let users = JSON.parse(localStorage.getItem("users"))||{};
    let keys = Object.keys(users);

    let output="";
    let approvalUI="";

    document.getElementById("totalUsers").innerText = keys.length;
    document.getElementById("pendingUsers").innerText =
        keys.filter(u=>!users[u]?.approved).length;

    keys.forEach(u=>{
        let isApproved = users[u]?.approved;

        output+=`
        <tr>
            <td>${u}</td>
            <td>${isApproved?"✅ Approved":"❌ Pending"}</td>
            <td>
                ${!isApproved?`<button class="approve" onclick="approveUser('${u}')">Approve</button>`:""}
                <button class="delete" onclick="deleteUser('${u}')">Delete</button>
            </td>
        </tr>`;

        if(!isApproved){
            approvalUI += `${u} ❌ 
            <button class="approve" onclick="approveUser('${u}')">Approve</button><br>`;
        }
    });

    document.getElementById("userTable").innerHTML = output;
    document.getElementById("approvalList").innerHTML =
        approvalUI || "No Pending Users";
}

/* APPROVE */
function approveUser(u){
    let users = JSON.parse(localStorage.getItem("users"))||{};
    if(users[u]){
        users[u].approved = true;
        localStorage.setItem("users",JSON.stringify(users));
        loadUsers();
    }
}

/* DELETE USER */
function deleteUser(u){
    let users=JSON.parse(localStorage.getItem("users"))||{};
    delete users[u];
    localStorage.setItem("users",JSON.stringify(users));
    loadUsers();
}

/* ATTENDANCE */
function loadAttendance(){

    let data=JSON.parse(localStorage.getItem("allAttendance"))||[];
    let container=document.getElementById("attendanceTable");

    document.getElementById("totalRecords").innerText=data.length;

    if(data.length===0){
        container.innerHTML="<p>No Data Available</p>";
        return;
    }

    let grouped={};

    data.forEach((d,i)=>{
        let date=d.date || "No Date";

        if(!grouped[d.user]) grouped[d.user]={};
        if(!grouped[d.user][date]) grouped[d.user][date]=[];

        grouped[d.user][date].push({...d,index:i});
    });

    let output="";

    Object.keys(grouped).forEach(user=>{

        output+=`<div class="section"><h2>${user}</h2>`;

        Object.keys(grouped[user]).forEach(date=>{

            output+=`
            <h4>${date}</h4>

            <table>
                <thead>
                    <tr>
                        <th>University</th>
                        <th>College</th>
                        <th>Course</th>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Roll</th>
                        <th>Present</th>
                        <th>Absent</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>`;

            grouped[user][date].forEach(d=>{
                output+=`
                <tr>
                    <td>${d.university||"-"}</td>
                    <td>${d.college||"-"}</td>
                    <td>${d.course||"-"}</td>
                    <td>${d.name||"-"}</td>
                    <td>${d.className||"-"}</td>
                    <td>${d.roll||"-"}</td>
                    <td>${d.present||0}</td>
                    <td>${d.absent||0}</td>
                    <td>
                        <button class="delete" onclick="deleteAttendance(${d.index})">Delete</button>
                    </td>
                </tr>`;
            });

            output+=`</tbody></table>`;
        });

        output+=`</div>`;
    });

    container.innerHTML=output;
}

/* DELETE ATTENDANCE */
function deleteAttendance(i){
    let data=JSON.parse(localStorage.getItem("allAttendance"))||[];
    data.splice(i,1);
    localStorage.setItem("allAttendance",JSON.stringify(data));
    loadAttendance();
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("admin");
    window.location.href="login.html";
}

/* INIT */
loadUsers();
loadAttendance();

</script>

</body>
</html>
