<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial;
    background:#0f172a;
    color:#fff;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

button{
    padding:8px 12px;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

.delete{background:#ef4444;color:#fff;}
.approve{background:#22c55e;color:#fff;}
.logout{background:#3b82f6;color:#fff;}

.section{
    margin-top:20px;
    padding:15px;
    background:#1e293b;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #334155;
    padding:10px;
    text-align:center;
}

th{background:#111827;}

.empty{color:#94a3b8;text-align:center;padding:10px;}

.filter{
    padding:8px;
    margin-right:10px;
    border-radius:5px;
    border:none;
}

.stats{
    margin-top:10px;
    color:#38bdf8;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>⚙️ Admin Panel</h2>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- 🔥 APPROVAL SECTION -->
<div class="section">
    <h3>📌 User Approval</h3>
    <div id="approvalList"></div>
</div>

<!-- 👤 USERS TABLE -->
<div class="section">
    <h3>👤 Users</h3>
    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>
</div>

<!-- 📊 ATTENDANCE -->
<div class="section">
    <h3>📊 Attendance Data</h3>

    <input class="filter" placeholder="Search User" id="fUser" onkeyup="filterData()">
    <input class="filter" placeholder="Search Name" id="fName" onkeyup="filterData()">

    <div class="stats" id="stats"></div>

    <table id="adminTable">
        <thead>
            <tr>
                <th>User</th>
                <th>Name</th>
                <th>College</th>
                <th>Course</th>
                <th>Present</th>
                <th>Absent</th>
                <th>%</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<script>

/* 🔐 PROTECT */
if(!localStorage.getItem("admin")){
    window.location.href = "login.html";
}

/* 🔄 LOAD USERS */
function loadUsers(){

    let users = JSON.parse(localStorage.getItem("users")) || {};
    let output = "";
    let approvalUI = "";

    let keys = Object.keys(users);

    if(keys.length === 0){
        output = `<tr><td colspan="3" class="empty">No users</td></tr>`;
        approvalUI = "No users";
    }else{

        keys.forEach(user => {

            let isApproved = users[user].approved;

            // TABLE
            output += `
            <tr>
                <td>${user}</td>
                <td>${isApproved ? "✅ Approved" : "❌ Pending"}</td>
                <td>
                    ${!isApproved ? `<button class="approve" onclick="approveUser('${user}')">Approve</button>` : ""}
                    <button class="delete" onclick="deleteUser('${user}')">Delete</button>
                </td>
            </tr>
            `;

            // APPROVAL SECTION
            if(!isApproved){
                approvalUI += `
                <p>
                    ${user} - ❌ Pending
                    <button class="approve" onclick="approveUser('${user}')">Approve</button>
                </p>
                `;
            }
        });
    }

    document.getElementById("userTable").innerHTML = output;
    document.getElementById("approvalList").innerHTML = approvalUI;
}

/* ✅ APPROVE */
function approveUser(username){

    let users = JSON.parse(localStorage.getItem("users")) || {};

    users[username].approved = true;
    localStorage.setItem("users", JSON.stringify(users));

    alert("✅ Approved");
    loadUsers();
}

/* ❌ DELETE USER */
function deleteUser(user){

    if(!confirm("Delete user?")) return;

    let users = JSON.parse(localStorage.getItem("users")) || {};
    delete users[user];
    localStorage.setItem("users", JSON.stringify(users));

    let data = JSON.parse(localStorage.getItem("allAttendance")) || [];
    data = data.filter(d => d.user !== user);
    localStorage.setItem("allAttendance", JSON.stringify(data));

    loadUsers();
    loadAttendance();
}

/* 📊 LOAD ATTENDANCE */
function loadAttendance(){

    let data = JSON.parse(localStorage.getItem("allAttendance")) || [];
    let output = "";

    if(data.length === 0){
        output = `<tr><td colspan="8" class="empty">No Data</td></tr>`;
    }else{

        data.forEach((d,i)=>{

            output += `
            <tr>
                <td>${d.user}</td>
                <td>${d.name}</td>
                <td>${d.college}</td>
                <td>${d.course}</td>
                <td>${d.present}</td>
                <td>${d.absent}</td>
                <td>${d.percent}</td>
                <td>
                    <button class="delete" onclick="deleteAttendance(${i})">Delete</button>
                </td>
            </tr>
            `;
        });
    }

    document.getElementById("attendanceTable").innerHTML = output;
    document.getElementById("stats").innerText = "Total Records: " + data.length;
}

/* ❌ DELETE ATTENDANCE */
function deleteAttendance(i){
    let data = JSON.parse(localStorage.getItem("allAttendance")) || [];
    data.splice(i,1);
    localStorage.setItem("allAttendance", JSON.stringify(data));
    loadAttendance();
}

/* 🔍 FILTER */
function filterData(){

    let u = fUser.value.toLowerCase();
    let n = fName.value.toLowerCase();

    document.querySelectorAll("#attendanceTable tr").forEach(row=>{
        let td = row.cells;

        let match =
            td[0].innerText.toLowerCase().includes(u) &&
            td[1].innerText.toLowerCase().includes(n);

        row.style.display = match ? "" : "none";
    });
}

/* 🚪 LOGOUT */
function logout(){
    localStorage.removeItem("admin");
    window.location.href = "login.html";
}

/* INIT */
loadUsers();
loadAttendance();

</script>

</body>
</html>
